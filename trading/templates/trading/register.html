{% extends 'trading/base.html' %}
{% block title %}Register — Mini Zerodha{% endblock %}

{% block body %}
<div class="auth-container">
  <div class="auth-card animate-fadeIn">
    <div class="auth-logo">
      <div class="brand">📈 Mini Zerodha</div>
      <div class="sub">India's Demo Trading Platform</div>
    </div>

    <h2 class="auth-title">Create Account</h2>
    <p class="auth-sub">Start paper trading with ₹1,00,000</p>

    <form id="register-form" novalidate>
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" id="name" name="name" class="form-control"
               placeholder="Your full name" required autofocus>
      </div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" name="email" class="form-control"
               placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" name="password" class="form-control"
               placeholder="At least 6 characters" required>
      </div>

      <div id="register-error" style="color:#ef4444;font-size:13px;text-align:center;margin-bottom:12px;min-height:18px"></div>

      <button type="submit" id="register-btn" class="btn btn-primary btn-full btn-lg">
        Create Account →
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="/login/">Login →</a>
    </div>
  </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
// Redirect if already logged in
if (Auth.isLoggedIn()) {
  window.location.replace('/dashboard/');
}

document.getElementById('register-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  document.getElementById('register-error').textContent = '';

  const btn = document.getElementById('register-btn');
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!name || !email || !password) {
    document.getElementById('register-error').textContent = 'Please fill in all fields.';
    return;
  }

  if (password.length < 6) {
    document.getElementById('register-error').textContent = 'Password must be at least 6 characters.';
    return;
  }

  setLoading(btn, true);
  
  try {
    const res = await API.post('/api/auth/register/', { name, email, password });
    Toast.success('Account Created! 🎉', 'Welcome, ' + res.user.name);
    Auth.saveAuthAndRedirect(res.tokens, res.user, '/dashboard/');
  } catch (err) {
    const msg = err?.data?.error || 'Registration failed. Please try again.';
    document.getElementById('register-error').textContent = msg;
    setLoading(btn, false);
  }
});
</script>
{% endblock %}
